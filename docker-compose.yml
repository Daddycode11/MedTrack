services:
  web:
    build: .
    command: >
      sh -c "python manage.py collectstatic --noinput &&
             gunicorn medtrack.wsgi:application --bind 0.0.0.0:8000"
    env_file:
      - .env
    volumes:
      - static_volume:/app/static
      - media_volume:/app/media
    depends_on:
      - db
    restart: always

  db:
    image: postgres:15
    environment:
      POSTGRES_DB: medtrack
      POSTGRES_USER: medtrackuser
      POSTGRES_PASSWORD: medtrackpass
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    restart: always

  nginx:
    image: nginx:1.25
    ports:
      - "80:80"
    volumes:
      - static_volume:/static
      - media_volume:/media
    configs:
      - source: nginx_config
        target: /etc/nginx/nginx.conf
    depends_on:
      - web
    restart: always

configs:
  nginx_config:
    content: |
      events {}
      http {
        include mime.types;
        default_type application/octet-stream;
        server {
          listen 80;
          location /static/ { alias /static/; }
          location /media/ { alias /media/; }
          location / {
            proxy_pass http://web:8000;
            proxy_set_header Host $$host;
            proxy_set_header X-Real-IP $$remote_addr;
            proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
          }
        }
      }

volumes:
  postgres_data:
  static_volume:
  media_volume: