services:
  web:
    build: .
    command: >
      sh -c "python manage.py collectstatic --noinput &&
             gunicorn medtrack.wsgi:application --bind 0.0.0.0:8000"
    env_file:
      - .env
    volumes:
      - static_volume:/app/static    # ← ADD THIS
      - media_volume:/app/media      # ← ADD THIS
    depends_on:
      - db
    restart: always

  db:
    image: postgres:15
    environment:
      POSTGRES_DB: medtrack
      POSTGRES_USER: medtrackuser
      POSTGRES_PASSWORD: medtrackpass
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    restart: always

  nginx:
    image: nginx:1.25
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - static_volume:/static
      - media_volume:/media
    depends_on:
      - web
    restart: always

volumes:
  postgres_data:
  static_volume:
  media_volume: