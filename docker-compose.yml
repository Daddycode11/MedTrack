version: '3.9'

services:
  web:
    build: .
    command: gunicorn medtrack.wsgi:application --bind 0.0.0.0:8000
    volumes:
      - ./medtrack:/app/medtrack
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      - db
    restart: always

  db:
    image: postgres:15
    environment:
      POSTGRES_DB: medtrack
      POSTGRES_USER: medtrackuser
      POSTGRES_PASSWORD: medtrackpass
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    restart: always

  nginx:
    image: nginx:1.25
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./medtrack/static:/static
      - ./medtrack/media:/media
    depends_on:
      - web
    restart: always

volumes:
  postgres_data:
